<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Starling · 电子百叶进气口 3D 机构示意</title>
<style>
  :root{ --bg:#16130f; --panel:#221d18; --text:#ece7df; --muted:#b6ab9c; --line:#3a332b; }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif}
  .wrap{max-width:920px;margin:0 auto;padding:24px 18px 40px}
  h1{font-weight:600;font-size:20px;margin:0 0 4px}
  .sub{color:var(--muted);font-size:13px;margin:0 0 18px}
  #stage{position:relative;width:100%;height:460px;border-radius:14px;overflow:hidden;border:1px solid var(--line);background:#0f0c09}
  #stage canvas{display:block;cursor:grab;touch-action:none}
  #stage canvas:active{cursor:grabbing}
  .row{display:flex;align-items:center;gap:12px;margin:14px 0 8px}
  .row label{font-size:14px;color:var(--muted);white-space:nowrap}
  input[type=range]{flex:1;accent-color:#5aa0e6}
  #out{font-size:14px;font-weight:600;min-width:150px;text-align:right}
  .btns{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
  button{background:var(--panel);color:var(--text);border:1px solid var(--line);border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer}
  button:hover{background:#2c2620}
  .sw{display:inline-block;width:12px;height:12px;border-radius:3px;vertical-align:-1px;margin-right:5px}
  .leg{font-size:12.5px;color:var(--muted)}
  .note{font-size:12px;color:var(--muted);margin-top:14px;line-height:1.6}
</style>
</head>
<body>
<div class="wrap">
  <h1>Starling · 电子百叶进气口（机构示意）</h1>
  <p class="sub">GSX250R 车头两侧 · 固定框 + 多片联动百叶 · 低速齐平 / 高速前缘下斜张开 · 1 自由度</p>
  <div id="stage"><div id="fallback" style="display:none;padding:16px;color:#b6ab9c">3D 加载失败（需要联网加载 three.js）。</div></div>
  <div class="row">
    <label for="speed">车速 / 开度</label>
    <input id="speed" type="range" min="0" max="100" value="0" step="1">
    <span id="out">闭合 · 0 km/h</span>
  </div>
  <div class="btns">
    <button id="auto">▶ 自动播放</button>
    <button data-y="0.5" data-x="0.2">斜视</button>
    <button data-y="0" data-x="0.04">正视</button>
    <button data-y="0" data-x="1.28">俯视</button>
    <button data-y="1.55" data-x="0.12">侧视</button>
    <span style="flex:1"></span>
    <span class="leg"><span class="sw" style="background:#9a9286"></span>固定框·上/外</span>
    <span class="leg"><span class="sw" style="background:#efa733"></span>固定框·下</span>
    <span class="leg"><span class="sw" style="background:#5aa0e6"></span>百叶·前缘下斜</span>
  </div>
  <p class="note">视觉件,非性能件。鼠标拖动旋转;滑杆控制开度。叶片张开时前缘朝下(不抬车头)。此为机构示意,真实 GSX250R 车型与叶形精修为后续步骤。</p>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
  var T=window.THREE, stage=document.getElementById('stage');
  if(!T){document.getElementById('fallback').style.display='block';return;}
  var W=stage.clientWidth||880, H=460;
  var renderer=new T.WebGLRenderer({antialias:true,alpha:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio||1,2));
  renderer.setSize(W,H); renderer.setClearColor(0x000000,0);
  stage.appendChild(renderer.domElement);
  var scene=new T.Scene();
  var cam=new T.PerspectiveCamera(45,W/H,0.1,100);
  cam.position.set(0,2.7,8.0); cam.lookAt(0,0.85,0.4);
  scene.add(new T.AmbientLight(0xffffff,0.9));
  var d1=new T.DirectionalLight(0xffffff,0.6); d1.position.set(5,9,7); scene.add(d1);
  var d2=new T.DirectionalLight(0xffffff,0.3); d2.position.set(-6,4,-5); scene.add(d2);
  var pivot=new T.Group(); scene.add(pivot);
  var grid=new T.GridHelper(9,18,0x6f685e,0x4a443b); grid.material.transparent=true; grid.material.opacity=0.4; pivot.add(grid);
  function mat(c){return new T.MeshStandardMaterial({color:c,roughness:0.55,metalness:0.05,emissive:c,emissiveIntensity:0.15,side:T.DoubleSide});}
  function panel(w,h,l,c){return new T.Mesh(new T.BoxGeometry(w,h,l), mat(c));}
  var body=new T.Mesh(new T.BoxGeometry(0.85,0.7,2.2), new T.MeshStandardMaterial({color:0x55504a,roughness:0.7})); body.position.set(0,0.82,0); pivot.add(body);
  var tank=new T.Mesh(new T.BoxGeometry(0.66,0.34,1.0), new T.MeshStandardMaterial({color:0x6a655d,roughness:0.7})); tank.position.set(0,1.2,0.0); pivot.add(tank);
  var wheel=new T.Mesh(new T.CylinderGeometry(0.5,0.5,0.18,24), new T.MeshStandardMaterial({color:0x2a2722,roughness:0.8})); wheel.rotation.z=Math.PI/2; wheel.position.set(0,0.5,1.5); pivot.add(wheel);
  function makeVent(){
    var g=new T.Group();
    var ft=panel(0.52,0.05,0.06,0x9a9286); ft.position.set(0,0.27,0); g.add(ft);
    var fb=panel(0.52,0.05,0.06,0xefa733); fb.position.set(0,-0.27,0); g.add(fb);
    var fo=panel(0.05,0.55,0.06,0x9a9286); fo.position.set(-0.26,0,0); g.add(fo);
    var slats=[], ys=[0.18,0.06,-0.06,-0.18], i;
    for(i=0;i<ys.length;i++){ var sp=new T.Group(); sp.position.set(0,ys[i],0); g.add(sp); var sm=panel(0.46,0.12,0.02,0x5aa0e6); sp.add(sm); slats.push(sp); }
    return {g:g, slats:slats};
  }
  var L=makeVent(); L.g.position.set(-0.45,0.98,1.0); pivot.add(L.g);
  var R=makeVent(); R.g.position.set(0.45,0.98,1.0); R.g.scale.x=-1; pivot.add(R.g);
  function lerp(a,b,t){return a+(b-a)*t;}
  function setT(t){ var a=lerp(0,0.95,t), i; for(i=0;i<L.slats.length;i++) L.slats[i].rotation.x=a; for(i=0;i<R.slats.length;i++) R.slats[i].rotation.x=a; }
  var rotY=0.5, rotX=0.2, dom=renderer.domElement, down=false, px=0, py=0;
  dom.addEventListener('pointerdown',function(e){down=true;px=e.clientX;py=e.clientY;if(dom.setPointerCapture)dom.setPointerCapture(e.pointerId);});
  dom.addEventListener('pointermove',function(e){if(!down)return;rotY+=(e.clientX-px)*0.008;rotX+=(e.clientY-py)*0.008;rotX=Math.max(-0.2,Math.min(1.35,rotX));px=e.clientX;py=e.clientY;});
  dom.addEventListener('pointerup',function(){down=false;});
  dom.addEventListener('pointerleave',function(){down=false;});
  var speed=document.getElementById('speed'), out=document.getElementById('out');
  function txt(v){return (v<=2?'闭合(齐平)':(v>=98?'全开':'开度 '+Math.round(v)+'%'))+' · '+Math.round(v)+' km/h';}
  var cur=0;
  function applyV(v){cur=v;setT(v/100);out.textContent=txt(v);speed.value=Math.round(v);}
  var auto=false, dir=1, ab=document.getElementById('auto');
  function updAuto(){ab.textContent=auto?'❚❚ 暂停':'▶ 自动播放';}
  speed.addEventListener('input',function(e){auto=false;updAuto();applyV(+e.target.value);});
  ab.addEventListener('click',function(){auto=!auto;updAuto();});
  var vbtns=document.querySelectorAll('button[data-y]'), bi;
  for(bi=0;bi<vbtns.length;bi++){ (function(b){ b.addEventListener('click',function(){rotY=+b.getAttribute('data-y');rotX=+b.getAttribute('data-x');}); })(vbtns[bi]); }
  window.addEventListener('resize',function(){W=stage.clientWidth||880;renderer.setSize(W,H);cam.aspect=W/H;cam.updateProjectionMatrix();});
  applyV(0);
  function loop(){requestAnimationFrame(loop);if(auto){var v=cur+dir*0.7;if(v>=100){v=100;dir=-1;}if(v<=0){v=0;dir=1;}applyV(v);}pivot.rotation.y=rotY;pivot.rotation.x=rotX;renderer.render(scene,cam);}
  loop();
})();
</script>
</body>
</html>
